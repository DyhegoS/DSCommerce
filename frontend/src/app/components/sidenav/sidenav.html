<mat-sidenav-container autosize class="container">
  <mat-sidenav
    class="sidenav"
    mode="side"
    opened
    [style.width]="expanded() ? '200px' : '56px'"
    (mouseenter)="expanded.set(true)"
    (mouseleave)="expanded.set(false)"
  >
    <mat-nav-list>
      <a mat-list-item routerLink="/">
        <mat-icon matListItemIcon>home</mat-icon>
        <span matListItemTitle>Home</span>
      </a>
    </mat-nav-list>
    <mat-nav-list>
      <a mat-list-item routerLink="/products">
        <mat-icon matListItemIcon>inventory_2</mat-icon>
        <span matListItemTitle>Produtos</span>
      </a>
    </mat-nav-list>
  </mat-sidenav>
  <mat-sidenav-content class="content">
    <router-outlet></router-outlet>
  </mat-sidenav-content>
</mat-sidenav-container>
