<div class="users-container">
  <div class="users-header">
    <h1>Usuários</h1>
    <button class="btn-add">+ Novo Usuário</button>
  </div>

  <div class="users-content">
    <table class="users-table">
      <thead>
        <tr>
          <th>ID</th>
          <th>Nome</th>
          <th>E-Mail</th>
          <th>Perfil</th>
          <th>Ações</th>
        </tr>
      </thead>
      <tbody>
        <tr *ngFor="let user of users" class="user-row">
          <td class="id">{{ user.id }}</td>
          <td class="name">{{ user.name }}</td>
          <td class="email">{{ user.email }}</td>
          <td class="role">
            <span [class]="'badge ' + getRole(user.role)">
              {{ user.role }}</span> </td>
          <td class="actions">

            <button
              class="btn-edit"
              (click)="editUser(user)"
              title="Editar usuário"

            >
            <i class="ph ph-pencil-simple-line"></i>
            Editar
            </button>
            <button
              class="btn-delete"
              (click)="deleteUser(user.id)"
              title="Excluir usuário"
            >
              🗑️ Excluir
            </button>
          </td>
        </tr>
      </tbody>
    </table>
</div>
