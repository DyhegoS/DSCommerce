<div class="products-container">
  <div class="products-header">
    <h1>Produtos</h1>
    <button class="btn-add">
      <i class="ph ph-plus"></i>
      Novo Produto</button>
  </div>

  <div class="products-content">
    <table class="products-table">
      <thead>
        <tr>
          <th>ID</th>
          <th>Nome</th>
          <th>Descrição</th>
          <th>Preço</th>
          <th>Quantidade</th>
          <th>Imagem</th>
          <th>Ações</th>
        </tr>
      </thead>
      <tbody>
        <tr *ngFor="let product of products" class="product-row">
          <td class="id fw-bold">{{ product.id }}</td>
          <td class="name fw-bold">{{ product.name }}</td>
          <td class="description">{{ product.description }}</td>
          <td class="price fw-bold text-success">{{ formatCurrency(product.price) }}</td>
          <td class="quantity text-center">{{ product.quantity }}</td>
          <td class="image">
            <button
              class="btn-image"
              (click)="openImage(product.imageUrl)"
              title="Clique para visualizar"
            >
              Ver Imagem
            </button>
          </td>
          <td class="actions">
            <button
              class="btn-edit"
              (click)="editProduct(product)"
              title="Editar produto"
            >
            <i class="ph ph-pencil-simple-line"></i>
            Editar
            </button>
            <button
              class="btn-delete"
              (click)="deleteProduct(product.id)"
              title="Deletar produto"
            >
            <i class="ph ph-trash"></i>
              Deletar
            </button>
          </td>
        </tr>
      </tbody>
    </table>
  </div>

  <!-- Modal de Imagem -->
  <div *ngIf="selectedImageUrl" class="image-modal" (click)="closeImage()">
    <div class="image-modal-content" (click)="$event.stopPropagation()">
      <button class="btn-close" (click)="closeImage()">✕</button>
      <img [src]="selectedImageUrl" alt="Imagem do Produto" class="modal-image" />
    </div>
  </div>
</div>
