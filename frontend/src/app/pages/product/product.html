<div class="header-container">
  <button matButton="filled" (click)="openDialog()" class="btnInsert">Novo Produto</button>
</div>

<mat-tab-group>
  <mat-tab label="Categorias">
    <mat-form-field>
      <mat-label>Categorias</mat-label>
      <mat-select (selectionChange)="onCategoryChange($event.value)">
        <mat-option value="">Todas</mat-option>
        @for (category of categories; track category.name) {
          <mat-option [value]="category.name">{{ category.name }}</mat-option>
        }
      </mat-select>
    </mat-form-field>
  </mat-tab>
  <mat-tab label="Nome"> ds </mat-tab>
  <mat-tab label="Third"> Content 3 </mat-tab>
</mat-tab-group>

<table mat-table [dataSource]="products()" class="mat-elevation-z8 table-container">
  <ng-container matColumnDef="id">
    <th mat-header-cell *matHeaderCellDef>ID</th>
    <td mat-cell *matCellDef="let product">{{ product.id }}</td>
  </ng-container>

  <ng-container matColumnDef="name">
    <th mat-header-cell *matHeaderCellDef>NOME</th>
    <td mat-cell *matCellDef="let product">{{ product.name }}</td>
  </ng-container>

  <ng-container matColumnDef="price">
    <th mat-header-cell *matHeaderCellDef>PREÇO</th>
    <td mat-cell *matCellDef="let product">{{ product.price }}</td>
  </ng-container>

  <ng-container matColumnDef="quantity">
    <th mat-header-cell *matHeaderCellDef>QUANTIDADE</th>
    <td mat-cell *matCellDef="let product">{{ product.quantity }}</td>
  </ng-container>

  <ng-container matColumnDef="imgUrl">
    <th mat-header-cell *matHeaderCellDef>IMAGEM</th>
    <td mat-cell *matCellDef="let product">
      <button mat-raised-button class="btn-select">Imagem</button>
    </td>
  </ng-container>

  <ng-container matColumnDef="select">
    <th mat-header-cell *matHeaderCellDef>SELECIONAR</th>
    <td mat-cell *matCellDef="let product">
      <button mat-raised-button class="btn-select">Selecionar</button>
    </td>
  </ng-container>

  <tr mat-header-row *matHeaderRowDef="columns; sticky: true"></tr>
  <tr mat-row *matRowDef="let row; columns: columns"></tr>
</table>

<mat-paginator
  [length]="totalElements()"
  [pageSize]="pageSize()"
  [pageSizeOptions]="[5, 10, 25]"
  (page)="onPageChange($event)"
>
</mat-paginator>
