<div class="header-container">
  <button mat-flat-button color="primary" (click)="openDialog()" class="btnInsert">
    Novo Produto
  </button>
</div>

<mat-tab-group>
  <mat-tab label="Categorias">
    <mat-form-field appearance="fill">
      <mat-label>Categorias</mat-label>
      <mat-select (selectionChange)="onCategoryChange($event.value)">
        <mat-option value="">Todas</mat-option>
        <mat-option *ngFor="let category of categories" [value]="category.name">
          {{ category.name }}
        </mat-option>
      </mat-select>
    </mat-form-field>
  </mat-tab>
  <mat-tab label="Nome">
    <mat-form-field appearance="fill">
      <mat-label>Buscar por nome</mat-label>
      <input matInput (input)="onNameChange($event)" placeholder="Digite o nome..." />
    </mat-form-field>
  </mat-tab>
  <mat-tab label="Preço">
    <div class="price-filter">
      <mat-form-field appearance="fill">
        <mat-label>Preço mínimo</mat-label>
        <input
          matInput
          type="number"
          min="0"
          placeholder="0"
          (input)="minPrice.set(+$any($event.target).value)"
        />
      </mat-form-field>

      <mat-form-field appearance="fill">
        <mat-label>Preço máximo</mat-label>
        <input
          matInput
          type="number"
          min="0"
          placeholder="9999"
          (input)="maxPrice.set(+$any($event.target).value)"
        />
      </mat-form-field>

      <button mat-flat-button color="primary" (click)="onPriceFilter()">Filtrar</button>
      <button mat-stroked-button color="accent" (click)="onPriceClear()">Limpar</button>
    </div>
  </mat-tab>
</mat-tab-group>

<table mat-table [dataSource]="products()" class="mat-elevation-z8 table-container">
  <ng-container matColumnDef="id">
    <th mat-header-cell *matHeaderCellDef>ID</th>
    <td mat-cell *matCellDef="let product">{{ product.id }}</td>
  </ng-container>

  <ng-container matColumnDef="name">
    <th mat-header-cell *matHeaderCellDef>NOME</th>
    <td mat-cell *matCellDef="let product">{{ product.name }}</td>
  </ng-container>

  <ng-container matColumnDef="categories">
    <th mat-header-cell *matHeaderCellDef>CATEGORIAS</th>
    <td mat-cell *matCellDef="let product">
      {{ product.categories?.map((cat) => cat.name).join(', ') }}
    </td>
  </ng-container>

  <ng-container matColumnDef="price">
    <th mat-header-cell *matHeaderCellDef>PREÇO</th>
    <td mat-cell *matCellDef="let product">R$ {{ product.price }}</td>
  </ng-container>

  <ng-container matColumnDef="quantity">
    <th mat-header-cell *matHeaderCellDef>QUANTIDADE</th>
    <td mat-cell *matCellDef="let product">{{ product.quantity }}</td>
  </ng-container>

  <ng-container matColumnDef="imgUrl">
    <th mat-header-cell *matHeaderCellDef>IMAGEM</th>
    <td mat-cell *matCellDef="let product">
      <button
        mat-icon-button
        color="primary"
        [disabled]="!product.imgUrl"
        (click)="showImage(product)"
        [attr.aria-label]="product.imgUrl ? 'Ver imagem' : 'Sem imagem'"
      >
        <mat-icon>image</mat-icon>
      </button>
    </td>
  </ng-container>

  <ng-container matColumnDef="actions">
    <th mat-header-cell *matHeaderCellDef>AÇÕES</th>
    <td mat-cell *matCellDef="let product">
      <button mat-icon-button color="primary" (click)="openDialog(product)">
        <mat-icon>edit</mat-icon>
      </button>
      <button mat-icon-button color="warn" (click)="deleteProduct(product.id!)">
        <mat-icon>delete</mat-icon>
      </button>
    </td>
  </ng-container>

  <tr mat-header-row *matHeaderRowDef="columns; sticky: true"></tr>
  <tr mat-row *matRowDef="let row; columns: columns"></tr>
</table>

<mat-paginator
  [length]="totalElements()"
  [pageSize]="pageSize()"
  [pageSizeOptions]="[5, 10, 25]"
  (page)="onPageChange($event)"
>
</mat-paginator>
