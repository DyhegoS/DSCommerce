<div class="header-container">
  <button mat-flat-button color="primary" (click)="openForm()">Novo Cliente</button>
</div>

<div class="filters">
  <mat-form-field appearance="fill">
    <mat-label>Nome</mat-label>
    <input
      matInput
      [value]="nameFilter()"
      (input)="nameFilter.set($any($event.target).value)"
      placeholder="Filtrar por nome"
    />
  </mat-form-field>
  <mat-form-field appearance="fill">
    <mat-label>CNPJ</mat-label>
    <input
      matInput
      [value]="cnpjFilter()"
      (input)="cnpjFilter.set($any($event.target).value)"
      placeholder="Filtrar por CNPJ"
    />
  </mat-form-field>
  <button mat-flat-button color="primary" (click)="search()">Buscar</button>
  <button mat-stroked-button color="accent" (click)="clearFilters()">Limpar</button>
</div>

<table mat-table [dataSource]="dataSource" class="mat-elevation-z8 table-container">
  <ng-container matColumnDef="id">
    <th mat-header-cell *matHeaderCellDef>ID</th>
    <td mat-cell *matCellDef="let client">{{ client.id }}</td>
  </ng-container>

  <ng-container matColumnDef="name">
    <th mat-header-cell *matHeaderCellDef>Nome</th>
    <td mat-cell *matCellDef="let client">{{ client.name }}</td>
  </ng-container>

  <ng-container matColumnDef="email">
    <th mat-header-cell *matHeaderCellDef>Email</th>
    <td mat-cell *matCellDef="let client">{{ client.email }}</td>
  </ng-container>

  <ng-container matColumnDef="cnpj">
    <th mat-header-cell *matHeaderCellDef>CNPJ</th>
    <td mat-cell *matCellDef="let client">{{ client.cnpj }}</td>
  </ng-container>

  <ng-container matColumnDef="address">
    <th mat-header-cell *matHeaderCellDef>Endereço</th>
    <td mat-cell *matCellDef="let client">{{ client.address }}</td>
  </ng-container>

  <ng-container matColumnDef="phone">
    <th mat-header-cell *matHeaderCellDef>Telefone</th>
    <td mat-cell *matCellDef="let client">{{ client.phone }}</td>
  </ng-container>

  <tr mat-header-row *matHeaderRowDef="columns"></tr>
  <tr mat-row *matRowDef="let row; columns: columns"></tr>
</table>

<mat-paginator
  [length]="totalElements()"
  [pageSize]="pageSize()"
  [pageSizeOptions]="[5, 10, 25]"
  (page)="onPageChange($event)"
></mat-paginator>
